version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: rts_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rts_game
      POSTGRES_USER: rts_user
      POSTGRES_PASSWORD: rts_pass123
    ports:
      - "5432:5432"
    volumes:
      - rts_pgdata:/var/lib/postgresql/data
      - ./rts_game/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rts_user -d rts_game"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: rts_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  rts_pgdata:
